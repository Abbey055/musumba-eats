<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Admin Login Container - No back button, no hints -->
    <div class="admin-container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="color: #8B4513; font-size: 2rem; margin-bottom: 0.3rem;">🔐 Admin Login</h2>
        </div>

        <form id="loginForm">
            <div style="margin-bottom: 1.2rem;">
                <label for="username" style="display: block; font-weight: 600; color: #2c1810; margin-bottom: 0.3rem; font-size: 0.95rem;">Username</label>
                <input type="text" id="username" placeholder="Enter username" required style="width: 100%; padding: 0.8rem 1rem; border: 2px solid #e0d6cc; border-radius: 10px; font-size: 1rem; background: #faf8f5; transition: all 0.3s;">
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label for="password" style="display: block; font-weight: 600; color: #2c1810; margin-bottom: 0.3rem; font-size: 0.95rem;">Password</label>
                <input type="password" id="password" placeholder="Enter password" required style="width: 100%; padding: 0.8rem 1rem; border: 2px solid #e0d6cc; border-radius: 10px; font-size: 1rem; background: #faf8f5; transition: all 0.3s;">
            </div>
            
            <button type="submit" style="width: 100%; background: linear-gradient(135deg, #8B4513, #D2691E); color: white; border: none; padding: 0.9rem; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; letter-spacing: 0.5px;">
                Login
            </button>
            <p id="errorMsg" class="error" style="text-align: center; margin-top: 0.8rem; font-weight: 600; min-height: 1.5rem; color: #e74c3c;"></p>
        </form>
    </div>

    <style>
        /* Focus styles */
        .admin-container input:focus {
            outline: none;
            border-color: #8B4513;
            background: white;
            box-shadow: 0 0 0 4px rgba(139, 69, 19, 0.1);
        }
        
        .admin-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.3);
        }
        
        .admin-container button:active {
            transform: translateY(0);
        }
        
        /* Error shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.5s ease;
        }
    </style>

    <script src="admin.js"></script>
</body>
</html>
